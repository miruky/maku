<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" role="img" aria-label="makuのアーキテクチャ図">
  <title>makuのアーキテクチャ</title>
  <style>
    .box { fill: none; stroke: #8b93a7; stroke-width: 1.5; }
    .accent-box { fill: none; stroke: #3b5bdb; stroke-width: 1.5; }
    .label { font: 600 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #4a5160; }
    .small { font: 400 11.5px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #6b7280; }
    .accent-label { font: 700 14px 'Hiragino Sans', 'Noto Sans JP', sans-serif; fill: #3b5bdb; }
    .arrow { stroke: #8b93a7; stroke-width: 1.5; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { stroke: #5b626f; }
      .label { fill: #c7ccd6; }
      .small { fill: #99a0ac; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0 0L8 4L0 8z" fill="#8b93a7"/>
    </marker>
  </defs>

  <rect x="18" y="74" width="150" height="60" rx="8" class="box"/>
  <text x="38" y="100" class="label">Markdown</text>
  <text x="38" y="120" class="small">LLMで整えた原稿</text>

  <rect x="238" y="74" width="150" height="60" rx="8" class="accent-box"/>
  <text x="258" y="100" class="accent-label">parseDeck</text>
  <text x="258" y="120" class="small">区切り・指示・ノート</text>

  <rect x="458" y="20" width="150" height="58" rx="8" class="box"/>
  <text x="478" y="46" class="label">markdown / render</text>
  <text x="478" y="66" class="small">スライドHTML</text>

  <rect x="458" y="92" width="150" height="42" rx="8" class="box"/>
  <text x="478" y="118" class="label">themes(100)</text>

  <rect x="458" y="148" width="150" height="42" rx="8" class="box"/>
  <text x="478" y="174" class="label">Presenter</text>

  <rect x="678" y="74" width="150" height="60" rx="8" class="box"/>
  <text x="698" y="100" class="label">ステージ</text>
  <text x="698" y="120" class="small">発表・一覧・PDF</text>

  <path class="arrow" d="M168 104 H232"/>
  <path class="arrow" d="M388 100 C420 92 425 52 452 50"/>
  <path class="arrow" d="M388 104 C420 108 430 112 452 113"/>
  <path class="arrow" d="M388 108 C420 130 430 166 452 168"/>
  <path class="arrow" d="M608 104 H672"/>
</svg>
